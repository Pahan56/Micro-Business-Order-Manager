<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micro Business Order Manager API</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        line-height: 1.6;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <h1>Micro Business Order Manager</h1>
    <p>
      Server running on
      <a id="server-link" href="#">loading...</a>
    </p>
    <p>
      <a id="orders-link" href="#">View orders (API)</a>
    </p>
    <p>
      Open the React app at
      <a href="http://localhost:3000">http://localhost:3000</a>
    </p>

    <script>
      const port = window.location.port || "5000";
      const serverUrl = `http://localhost:${port}`;

      document.getElementById("server-link").href = serverUrl;
      document.getElementById("server-link").textContent = serverUrl;

      document.getElementById("orders-link").href = `${serverUrl}/api/orders`;
    </script>
  </body>
</html>
